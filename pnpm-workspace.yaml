packages:
  - apps/*
  - packages/*

# Pin react types across the monorepo so mobile (react 18.2) and web (react
# 18.3) share one @types/react and the type-only React.ReactNode union stays
# coherent.
overrides:
  '@types/react': 18.3.3
  # Expo SDK 51 requires metro@0.80.x. Without these overrides, nativewind@4.2.4
  # pulls metro@0.84.4, pnpm hoists it, and Expo's CLI dies with
  # ERR_PACKAGE_PATH_NOT_EXPORTED on metro-cache/src/stores/FileStore.
  metro: 0.80.12
  metro-cache: 0.80.12
  metro-config: 0.80.12
  metro-core: 0.80.12
  metro-resolver: 0.80.12
  metro-runtime: 0.80.12
  metro-source-map: 0.80.12
  metro-transform-worker: 0.80.12

# Allow build scripts for trusted packages we depend on. Each entry is
# scrutinised when added — only add packages we actually trust to run code
# during install.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  simple-git-hooks: true
  unrs-resolver: true

# msw ships a postinstall that nags about running `msw init public/`.
# We don't need the auto-init (jest runs in node, not the browser), so
# tell pnpm to ignore the build script silently instead of erroring.
ignoredBuiltDependencies:
  - msw
