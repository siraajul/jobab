name: docs

# Build the VitePress docs and publish to GitHub Pages on every push to main
# that touches the docs source. The site appears at:
#   https://siraajul.github.io/jobab/

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'apps/docs/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  # Allows manual deploys from the Actions tab.
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; cancel earlier in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # `--no-frozen-lockfile` because we sometimes evolve the .npmrc hoist
        # patterns alongside docs changes and don't want a strict lock check
        # to block a docs deploy. The main CI (lint/typecheck/test) keeps the
        # strict check.
        run: pnpm install --no-frozen-lockfile

      - name: Build VitePress site
        run: pnpm docs:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
