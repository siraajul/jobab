id: price-001
description: Customer asks price in Banglish — agent must search catalog and quote real price
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      description: red cotton handloom shari with gold zari border
      price: 1650
      variants:
        - { name: Medium · Red, stock: 5 }
        - { name: Large · Red, stock: 2 }
conversation:
  - { role: customer, text: "lal jamdani shari koto?" }
expectations:
  - { kind: tool_called, tool: search_catalog }
  - { kind: reply_contains, all: ["1650"] }
  - { kind: reply_excludes, any: ["[stub", "i don't know", "i'm not sure"] }
  - { kind: language, must_be_one_of: [bangla, banglish] }

