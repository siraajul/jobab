id: bangla-greeting
description: Customer greets in pure Bangla — agent should reply Bangla-leaning
merchant_setup:
  products:
    - external_id: cotton_kurti
      title: Cotton Kurti
      price: 990
      variants: [{ name: Medium · Mustard, stock: 5 }]
conversation:
  - { role: customer, text: "আসসালামু আলাইকুম আপা, কুর্তি দেখতে চাই" }
expectations:
  - { kind: language, must_be_one_of: [bangla, banglish] }

