id: english-greeting
description: Customer in English — agent should reply English
merchant_setup:
  products:
    - external_id: cotton_kurti
      title: Cotton Kurti
      price: 990
      variants: [{ name: Medium · Mustard, stock: 5 }]
conversation:
  - { role: customer, text: "Hi! Do you have cotton kurtis?" }
expectations:
  - { kind: language, must_be_one_of: [english] }
  - { kind: tool_called, tool: search_catalog }

---

id: code-switch
description: Customer mixes Bangla + English numerals + Banglish — agent should match register
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "apa ei lal jamdani shari ta ki ache? size M lagbe, BDT te koto?" }
expectations:
  - { kind: tool_called, tool: search_catalog }
  - { kind: reply_contains, all: ["1650"] }
  - { kind: language, must_be_one_of: [banglish, english] }
