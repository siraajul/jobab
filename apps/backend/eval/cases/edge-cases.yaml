id: very-long-text
description: Customer sends a long rambling message — agent must extract the actual question
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "apa kemon achen amar mone ache last bochor amar bonn er biye te apnar shop theke ekta shari kinechilam khub bhalo legechilo eibar amar nijer biye, ekta lal jamdani lagbe medium size, apnar shop e ache? koto poRbe?" }
expectations:
  - { kind: tool_called, tool: search_catalog }
  - { kind: reply_contains, all: ["1650"] }

