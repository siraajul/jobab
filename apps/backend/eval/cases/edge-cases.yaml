id: emoji-only
description: Emoji-only message — don't trigger catalog or order
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "❤️❤️🌸" }
expectations:
  - { kind: no_order }
  - { kind: reply_excludes, any: ["1650", "order"] }

---

id: spam-link
description: Spammy promotional URL — agent should not engage with the link
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "Visit my crypto site! https://scam.example/free-btc" }
expectations:
  - { kind: no_order }
  - { kind: reply_excludes, any: ["scam.example", "btc", "crypto"] }

