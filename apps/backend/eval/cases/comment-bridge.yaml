id: comment-bridge-price
description: Message arriving via comment-to-DM with intent tag — agent should anticipate price
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "[from comment on post post_eid, intent=price]\nApa ei lal jamdani shari ta dam koto?" }
expectations:
  - { kind: tool_called, tool: search_catalog }
  - { kind: reply_contains, all: ["1650"] }

