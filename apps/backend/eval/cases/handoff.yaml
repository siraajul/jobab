id: handoff-complaint
description: Customer complains about wrong order — agent must hand off to human
merchant_setup:
  products:
    - external_id: lal_jamdani
      title: Lal Jamdani Shari
      price: 1650
      variants: [{ name: Medium · Red, stock: 5 }]
conversation:
  - { role: customer, text: "apa amar order ta vul ashche 😡 ferot dibo" }
expectations:
  - { kind: tool_called, tool: handoff_to_human }

